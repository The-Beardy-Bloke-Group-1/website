<dialog id="access-dialog">
    <div class="content">
        <h1>Accessibility Notice</h1>
        <p>This website has assistive technology available, should you need it.</p>
        <p>To go to the accessibility settings now, press <kbd>ENTER</kbd> on your keyboard.</p>
        <p>Settings will always be accessible via the button in the bottom left corner of the screen.</p>
    </div>

    <div class="user-input">
        <button autofocus class="button" id="confirm">Take me there!</button>
        <a id="close">I'm fine</a>
    </div>
</dialog>
